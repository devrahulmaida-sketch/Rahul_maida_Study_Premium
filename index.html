<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#6366f1',
                        'dark-bg': '#09090b',
                        'sidebar-bg': '#111114',
                        'border-white': 'rgba(255, 255, 255, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #09090b; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(12px); border: 1px solid var(--border-white); }
        .active-platform { background: rgba(99, 102, 241, 0.1) !important; color: #6366f1 !important; border-left: 4px solid #6366f1; }
        iframe { width: 100%; height: 100%; border: none; }
        .portal-container { height: calc(100vh - 64px); width: 100%; }
        
        /* Sidebar Styles */
        #sidebar { z-index: 100; }
        #overlay { z-index: 90; display: none; }
        
        @media (max-width: 1024px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #overlay.open { display: block; }
        }

        .back-btn-anim { transition: transform 0.2s; }
        .back-btn-anim:active { transform: scale(0.9); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Global Preloader -->
    <div id="globalPreloader" class="fixed inset-0 z-[10000] bg-[#09090b] flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Mobile Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <!-- Header -->
    <header class="h-16 glass flex items-center justify-between px-4 z-[110]">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </button>
            <button id="masterBackBtn" class="p-2 hover:bg-white/5 rounded-xl hidden back-btn-anim" onclick="goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" class="w-8 h-8 rounded-full border border-indigo-500" alt="Logo">
                <h1 class="text-sm font-black tracking-tighter uppercase italic hidden sm:block">RAHUL <span class="text-indigo-500">PREMIUM</span></h1>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <span id="platformLabel" class="text-[10px] font-black uppercase tracking-widest text-gray-500 mr-2">PW PORTAL</span>
            <button id="searchTrigger" class="p-2.5 bg-white/5 rounded-xl hover:bg-indigo-500/10 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-sidebar-bg border-r border-white/5 flex flex-col fixed inset-y-0 left-0 lg:static sidebar-transition">
            <div class="p-6">
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.3em] mb-8">Navigation</p>
                <nav class="space-y-2">
                    <button onclick="switchPlatform('pw')" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/5 transition-all active-platform" data-id="pw">
                        <span class="text-lg">⚡</span> PW PORTAL
                    </button>
                    <button onclick="switchPlatform('mj')" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/5 transition-all" data-id="mj">
                        <span class="text-lg">🎯</span> MISSION JEET
                    </button>
                    <button onclick="switchPlatform('nt')" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-sm text-gray-400 hover:bg-white/5 transition-all" data-id="nt">
                        <span class="text-lg">🏆</span> NEXT TOPPER
                    </button>
                </nav>
            </div>
            
            <div class="mt-auto p-6 border-t border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">System Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 relative">
            <div id="portalContainer" class="portal-container overflow-y-auto">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="fixed inset-0 bg-[#09090b]/95 backdrop-blur-2xl z-[200] hidden flex-col items-center pt-24 px-6">
        <div class="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-5 flex items-center gap-4 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <input type="text" id="searchInput" placeholder="Search premium batches..." class="bg-transparent border-none outline-none w-full text-lg font-bold">
            <button onclick="closeSearch()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div id="searchResults" class="w-full max-w-2xl max-h-[60vh] overflow-y-auto space-y-2 px-2"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
