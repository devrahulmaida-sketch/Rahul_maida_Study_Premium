<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'custom-purple': '#5a4bda',
                        'dark-bg': '#09090b',
                        'card-bg': '#18181b',
                        'border-gray': '#27272a'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary-color:#5a4bda;
            --primary-hover:#4a3bc8;
            --text-primary:#333333;
            --text-secondary:#666666;
            --bg-primary:#ffffff;
            --bg-secondary:#f5f7fa;
            --card-bg:#ffffff;
            --card-border:#eaedf3;
            --header-height:4.5rem;
            --transition:200ms ease;
        }

        body {
            background-color: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            min-height: 100vh;
            padding-top: var(--header-height);
            transition: background-color var(--transition), color var(--transition);
            font-family: 'Sora', sans-serif;
        }

        .dark-mode {
            --text-primary:#ffffff;
            --text-secondary:#d0d0d0;
            --bg-primary:#09090b;
            --bg-secondary:#18181b;
            --card-bg:#18181b;
            --card-border:#27272a;
        }

        #appHeader {
            height: var(--header-height);
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }
        .header-logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-color) !important; }
        .header-title { font-size: 1.1rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.4px; cursor: pointer; }
        .header-title span { color: var(--primary-color); }

        .header-btn {
            width: 38px; height: 38px; border-radius: 10px;
            background-color: var(--bg-secondary); color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }

        main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

        .card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 1rem; overflow: hidden; transition: transform 0.2s ease;
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary-color); }
        .card-img-wrap { width: 100%; height: 160px; background: var(--bg-secondary); }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .card-content { padding: 1rem; }
        .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; height: 2.8rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .action-btn {
            width: 100%; padding: 0.6rem; background: var(--primary-color);
            color: white; text-align: center; border-radius: 0.75rem;
            font-weight: 700; font-size: 0.8rem;
        }

        .live-badge { position: absolute; top: 12px; left: 12px; background: #ef4444; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; animation: pulse 2s infinite; z-index: 10; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .video-modal { position: fixed; inset: 0; background: black; z-index: 500; display: none; flex-direction: column; }
        .video-modal.active { display: flex; }
        #videoPlayer { width: 100%; height: 100%; max-height: 80vh; background: #000; }

        .theme-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .theme-modal-overlay.active { display: flex; }
        .theme-modal-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 1rem; width: 90%; max-width: 400px; padding: 1.5rem; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .theme-card { background: var(--bg-secondary); border: 2px solid transparent; border-radius: 0.75rem; padding: 1rem; cursor: pointer; text-align: center; font-weight: 600; }
        .theme-card.active { border-color: var(--primary-color); color: var(--primary-color); }

        #globalPreloader { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); }
        
        @media (max-width: 768px) {
            #appHeader { padding: 0 12px; }
            .header-title { font-size: 0.85rem; }
            main { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="videoModal" class="video-modal">
        <div class="flex justify-between items-center p-4 border-b border-white/10">
            <h3 id="videoTitle" class="text-white font-bold truncate pr-4 text-sm">Video Player</h3>
            <button onclick="closeVideo()" class="text-white text-2xl">✕</button>
        </div>
        <div class="flex-grow flex items-center justify-center relative">
            <video id="videoPlayer" controls playsinline></video>
            <div id="videoLoader" class="absolute inset-0 flex items-center justify-center bg-black/50 hidden"><div class="animate-spin h-8 w-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></div>
        </div>
    </div>

    <div id="globalPreloader">
        <div class="animate-spin h-8 w-8 border-4 border-custom-purple border-t-transparent rounded-full"></div>
    </div>

    <header id="appHeader">
        <div class="flex items-center gap-2">
            <button id="backBtn" class="header-btn hidden"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg></button>
            <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" class="header-logo-img" alt="Logo">
            <div class="header-title" id="pageTitle" onclick="location.href='/'">RAHUL MAIDA<span> STUDY PREMIUM</span></div>
        </div>
        <div class="flex items-center gap-2">
            <button id="favToggleBtn" class="header-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg></button>
            <button id="themeBtn" class="header-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg></button>
            <button id="searchBtn" class="header-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
        </div>
    </header>

    <main><div id="batchGrid" class="grid"></div></main>

    <div id="announcementModal" class="theme-modal-overlay">
        <div class="theme-modal-container max-w-lg p-0 overflow-hidden">
            <div id="notifImageContainer" class="w-full h-48 bg-gray-800 hidden"><img id="notifFullImage" class="w-full h-full object-cover"></div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-2"><div><span class="text-[10px] font-bold text-indigo-500 uppercase tracking-tighter" id="notifBatchLabel">Batch Name</span><h2 class="text-xl font-extrabold" id="notifHeading">Important Update</h2></div><button onclick="document.getElementById('announcementModal').classList.remove('active')" class="text-gray-500 hover:text-white">✕</button></div>
                <p id="notifFullText" class="text-sm text-gray-400 leading-relaxed mb-6">Announcement content...</p>
                <button onclick="document.getElementById('announcementModal').classList.remove('active')" class="action-btn">GOT IT</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="theme-modal-overlay">
        <div class="theme-modal-container max-w-xl">
            <div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">Recent Notices</h3><button onclick="document.getElementById('historyModal').classList.remove('active')" class="text-gray-400 text-2xl">✕</button></div>
            <div id="historyContent" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <div id="themeModal" class="theme-modal-overlay">
        <div class="theme-modal-container">
            <h3 class="text-lg font-bold mb-4">Appearance</h3>
            <div class="theme-grid"><div class="theme-card" data-theme="dark">Dark</div><div class="theme-card" data-theme="light">Light</div></div>
            <button id="closeTheme" class="w-full mt-4 p-2 text-sm text-gray-500">Close</button>
        </div>
    </div>

    <div id="searchModal" class="theme-modal-overlay">
        <div class="theme-modal-container max-w-2xl">
            <div class="flex items-center gap-4 bg-secondary p-4 rounded-xl mb-4 border border-border-gray">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" id="searchInput" placeholder="Search batches..." class="bg-transparent border-none outline-none text-white w-full text-lg">
                <button onclick="document.getElementById('searchModal').classList.remove('active')" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <div id="searchResults" class="max-h-[60vh] overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
