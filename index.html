<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rahul Maida | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --sidebar-bg: #111114; --main-bg: #09090b; }
        body { background: var(--main-bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        #sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
            background: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 5000; transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { transform: translateX(0); }
        
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); z-index: 4000; display: none;
        }
        #overlay.open { display: block; }

        .iframe-container {
            position: fixed; inset: 0; background: var(--main-bg); z-index: 6000;
            display: none; flex-direction: column;
        }
        .iframe-container.active { display: flex; }
        iframe { width: 100%; height: 100%; border: none; }

        .back-btn-float {
            position: fixed; top: 12px; left: 12px; z-index: 7000;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            color: #6366f1; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        .premium-card {
            background: rgba(24, 24, 27, 0.6); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem; overflow: hidden; transition: 0.2s;
            cursor: pointer; position: relative;
        }
        .premium-card:active { transform: scale(0.97); }
        .card-thumb { height: 140px; background: #000; position: relative; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 1rem; }

        .active-nav { background: rgba(99, 102, 241, 0.1) !important; color: var(--primary) !important; border-left: 4px solid var(--primary); }

        .glass-header { background: rgba(15, 15, 18, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        #searchModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 8000; display: none; flex-direction: column; align-items: center; pt: 10vh; }
        #searchModal.active { display: flex; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <div id="iframePortal" class="iframe-container">
        <button class="back-btn-float" onclick="closePortal()"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg></button>
        <iframe id="portalFrame"></iframe>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" class="w-10 h-10 rounded-full border border-indigo-500">
                <h1 class="text-sm font-black italic tracking-tighter uppercase">Rahul <span class="text-indigo-500">Premium</span></h1>
            </div>
            <nav class="space-y-1">
                <button onclick="switchCategory('pw')" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-xs text-gray-400 hover:bg-white/5 active-nav" data-cat="pw">⚡ PW PORTAL</button>
                <button onclick="switchCategory('mj')" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-xs text-gray-400 hover:bg-white/5" data-cat="mj">🎯 MISSION JEET</button>
                <button onclick="switchCategory('nt')" class="nav-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-xs text-gray-400 hover:bg-white/5" data-cat="nt">🏆 NEXT TOPPER</button>
            </nav>
        </div>
    </aside>

    <div class="flex flex-col h-screen w-screen overflow-hidden">
        <header class="h-16 glass-header flex items-center justify-between px-4 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 rounded-lg text-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button>
                <span id="viewTitle" class="text-[10px] font-black uppercase tracking-widest text-indigo-500">All Batches</span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openSearch()" class="p-2 bg-white/5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
                <button id="heartBtn" class="p-2 bg-white/5 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg></button>
            </div>
        </header>

        <main id="mainScroll" class="flex-1 overflow-y-auto">
            <div id="gridContainer" class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                <!-- Data here -->
            </div>
        </main>
    </div>

    <div id="searchModal">
        <div class="w-full max-w-2xl px-6 pt-10">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-3">
                <input type="text" id="searchInput" placeholder="Search batches..." class="bg-transparent border-none outline-none w-full text-lg font-bold">
                <button onclick="closeSearch()" class="text-gray-400">✕</button>
            </div>
            <div id="searchResults" class="mt-6 space-y-2 max-h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
