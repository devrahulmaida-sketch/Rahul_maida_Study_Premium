<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida - Study Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color:#5a4bda;
            --primary-hover:#4a3bc8;
            --bg-primary:#ffffff;
            --bg-secondary:#f5f7fa;
            --card-bg:#ffffff;
            --card-border:#eaedf3;
            --header-height:4.5rem;
            --transition:200ms ease;
        }

        body {
            background-color: var(--bg-primary) !important;
            color: #333 !important;
            min-height: 100vh;
            padding-top: var(--header-height);
            transition: background-color var(--transition);
            font-family: 'Sora', sans-serif;
        }

        .dark-mode {
            --bg-primary:#09090b;
            --bg-secondary:#18181b;
            --card-bg:#18181b;
            --card-border:#27272a;
            color: #ffffff !important;
        }

        #appHeader {
            height: var(--header-height);
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }
        .header-logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-color) !important; }
        .header-title { font-size: 1rem; font-weight: 800; letter-spacing: -0.4px; cursor: pointer; text-transform: uppercase; }
        .header-title span { color: var(--primary-color); }

        .header-btn {
            width: 38px; height: 38px; border-radius: 12px;
            background-color: var(--bg-secondary); color: inherit;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }

        main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

        .card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 1.25rem; overflow: hidden; transition: 0.2s ease;
            cursor: pointer; position: relative; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary-color); }
        .card-img-wrap { width: 100%; height: 160px; background: var(--bg-secondary); overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .card-content { padding: 1rem; flex-grow: 1; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem; line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; height: 2.6rem; }
        
        .action-btn {
            width: 100%; padding: 0.6rem; background: var(--primary-color);
            color: white; text-align: center; border-radius: 0.75rem;
            font-weight: 700; font-size: 0.75rem;
        }

        /* Iframe Redirection Overlay */
        .iframe-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 4000;
            display: none; flex-direction: column;
        }
        .iframe-box { width: 100%; height: 100%; border: none; }
        .back-btn-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 4100;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 0.8rem; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }

        .theme-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .theme-modal-overlay.active { display: flex; }
        .theme-modal-container { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 1.5rem; width: 90%; max-width: 400px; padding: 1.5rem; }
        
        #globalPreloader { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: var(--bg-primary); }

        @media (max-width: 768px) {
            #appHeader { padding: 0 12px; }
            .header-title { font-size: 0.8rem; }
            main { padding: 1rem; }
            .back-btn-overlay { top: 15px; left: 15px; padding: 8px 16px; font-size: 0.7rem; }
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Iframe Redirection Layer -->
    <div id="iframeContainer" class="iframe-overlay">
        <button class="back-btn-overlay" onclick="closeIframe()">← BACK TO PORTAL</button>
        <iframe id="studyIframe" class="iframe-box" allow="autoplay; fullscreen; clipboard-write"></iframe>
    </div>

    <div id="globalPreloader">
        <div class="animate-spin h-8 w-8 border-4 border-primary border-t-transparent rounded-full"></div>
    </div>

    <header id="appHeader">
        <div class="flex items-center gap-2">
            <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" class="header-logo-img" alt="Logo">
            <div class="header-title" onclick="location.href='/'">RAHUL<span> PREMIUM</span></div>
        </div>
        <div class="flex items-center gap-2">
            <button id="themeBtn" class="header-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg></button>
            <button id="searchBtn" class="header-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
        </div>
    </header>

    <main id="mainContent">
        <div id="batchGrid" class="grid"></div>
    </main>

    <div id="themeModal" class="theme-modal-overlay">
        <div class="theme-modal-container">
            <h3 class="text-lg font-bold mb-4 text-center">Appearance</h3>
            <div class="theme-grid flex gap-4"><div class="theme-card flex-1 bg-gray-100 text-black rounded-xl p-4 cursor-pointer text-center font-bold" data-theme="light">Light</div><div class="theme-card flex-1 bg-gray-900 text-white rounded-xl p-4 cursor-pointer text-center font-bold" data-theme="dark">Dark</div></div>
        </div>
    </div>

    <div id="searchModal" class="theme-modal-overlay">
        <div class="theme-modal-container max-w-2xl">
            <div class="flex items-center gap-4 bg-gray-100 dark:bg-gray-800 p-4 rounded-xl mb-4 border border-border-gray">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" id="searchInput" placeholder="Search batches..." class="bg-transparent border-none outline-none w-full text-lg">
                <button onclick="document.getElementById('searchModal').classList.remove('active')" class="text-gray-400">✕</button>
            </div>
            <div id="searchResults" class="max-h-[60vh] overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
