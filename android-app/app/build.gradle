plugins {
    id 'com.android.application'
}

android {
    namespace 'com.rahulmaida.pwclone'
    compileSdk 33

    defaultConfig {
        applicationId "com.rahulmaida.pwclone"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
