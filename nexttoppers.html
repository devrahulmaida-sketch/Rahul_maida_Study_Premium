<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rahul Maida - Next Toppers</title>
<link rel="icon" href="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.min.js"></script>
<style>
    /* ═══════════════════════════════════════════
       RESET & BASE (Rebranded Next Toppers Style)
    ═══════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.35); border-radius: 4px; }

    :root {
        --pr: #6366f1; --pr-d: #4f46e5; --pr-l: rgba(99,102,241,.15);
        --sur: #1e293b; --sur2: #0f172a; --sur3: #273449;
        --bd: rgba(30,41,59,.8); --bd2: rgba(99,102,241,.25);
        --tx: #e2e8f0; --tx2: #cbd5e1; --mu: #64748b; --mu2: #94a3b8;
        --r: 14px; --rs: 10px; --sh: 0 4px 20px rgba(0,0,0,.4);
        --shm: 0 8px 32px rgba(0,0,0,.5);
    }

    .site-header {
        position: fixed; top: 0; left: 0; right: 0; height: 50px;
        background: rgba(15,23,42,.97); border-bottom: 1px solid rgba(30,41,59,.6);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px; z-index: 900; box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .logo-wrap { display: flex; align-items: center; gap: 7px; }
    .logo-wrap img { height: 28px; width: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--pr); }
    .logo-wrap span { font-size: 13px; font-weight: 900; color: var(--pr); background: var(--pr-l); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--bd2); text-transform: uppercase; }

    .back-bar { display: none; position: fixed; top: 50px; left: 0; right: 0; height: 46px; background: rgba(15,23,42,.97); border-bottom: 1px solid rgba(30,41,59,.6); align-items: center; gap: 8px; padding: 0 10px; z-index: 890; }
    .back-bar.show { display: flex; }
    .back-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--pr-l); display: flex; align-items: center; justify-content: center; }
    .back-bar-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--tx); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .page { display: none; padding-top: 50px; min-height: 100vh; }
    .page.active { display: block; }
    .page.has-back { padding-top: 96px; }
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 14px 12px 60px; }

    /* BATCH GRID */
    .batches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .batch-card { background: var(--sur); border-radius: var(--r); border: 1px solid rgba(30,41,59,.8); overflow: hidden; cursor: pointer; transition: 0.2s; }
    .batch-card:hover { border-color: var(--pr); transform: translateY(-2px); }
    .batch-card-thumb { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
    .batch-card-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    .batch-card-body { padding: 12px; }
    .batch-card-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 8px; line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; height: 2.4rem; }
    .btn-explore { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--pr), var(--pr-d)); color: #fff; border-radius: 10px; font-weight: 700; font-size: 12px; text-transform: uppercase; }

    .spinner { width: 32px; height: 32px; border: 3px solid rgba(99,102,241,.2); border-top-color: var(--pr); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SEARCH */
    .search-bar { position: sticky; top: 50px; z-index: 800; background: #0f172a; padding: 10px; border-bottom: 1px solid rgba(30,41,59,.6); }
    .search-input { width: 100%; height: 40px; border-radius: 10px; background: #1e293b; border: 1px solid #334155; padding: 0 15px; color: #fff; font-size: 13px; }

    .home-tab-nav { display: flex; border-bottom: 1px solid #334155; }
    .home-tab-btn { flex: 1; text-align: center; padding: 12px; font-size: 12px; font-weight: 800; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; }
    .home-tab-btn.active { color: var(--pr); border-bottom-color: var(--pr); }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; display: none; }
</style>
</head>
<body>

    <div id="toastEl" class="toast"></div>

    <header class="site-header">
        <div class="logo-wrap">
            <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" alt="Logo">
            <span>RAHUL MAIDA | NEXT TOPPERS</span>
        </div>
    </header>

    <div id="backBar" class="back-bar">
        <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div id="backBarTitle" class="back-bar-title">Next Toppers Portal</div>
    </div>

    <div id="pageHome" class="page active">
        <div class="search-bar"><input type="text" id="searchInput" class="search-input" placeholder="Search next toppers batches..."></div>
        <div class="home-tab-nav">
            <div class="home-tab-btn active" id="tabAll">ALL BATCHES</div>
            <div class="home-tab-btn" id="tabFav">FAVOURITES</div>
        </div>
        <div class="page-wrap">
            <div id="batchesGrid" class="batches-grid"></div>
        </div>
    </div>

    <!-- Additional SPA Pages placeholders -->
    <div id="pageCourse" class="page has-back"><div class="page-wrap" id="courseWrap"></div></div>
    <div id="pageContent" class="page has-back"><div class="page-wrap" id="contentWrap"></div></div>

    <script>
        const PROXY = "https://rahul-study-bot.dev-rahulmaida.workers.dev";
        const S = { history: [], batches: [], favIds: new Set(JSON.parse(localStorage.getItem('nt_favs') || '[]')) };

        async function apiFetch(endpoint) {
            const url = `${PROXY}/nexttoppers?endpoint=${encodeURIComponent(endpoint)}`;
            const r = await fetch(url);
            return r.json();
        }

        function renderBatches() {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = S.batches.map(b => `
                <div class="batch-card" onclick="openCourse('${b.token}', '${b.title}')">
                    <div class="batch-card-thumb"><img src="${b.thumbnail}" loading="lazy"></div>
                    <div class="batch-card-body">
                        <div class="batch-card-title">${b.title}</div>
                        <button class="btn-explore">EXPLORE PORTAL</button>
                    </div>
                </div>
            `).join('');
        }

        async function init() {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await apiFetch('/api/batches');
                if (res.success) {
                    S.batches = res.data;
                    renderBatches();
                }
            } catch (e) { grid.innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Failed to load Next Toppers API</div>'; }
        }

        function navigate(pageId, title) {
            S.history.push({ pageId: document.querySelector('.page.active').id, title: document.getElementById('backBarTitle').innerText });
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('backBar').classList.add('show');
            document.getElementById('backBarTitle').innerText = title;
            window.scrollTo(0,0);
        }

        function goBack() {
            const prev = S.history.pop();
            if (!prev) { location.href = '/'; return; }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(prev.pageId).classList.add('active');
            if (prev.pageId === 'pageHome') document.getElementById('backBar').classList.remove('show');
            document.getElementById('backBarTitle').innerText = prev.title;
        }

        // Dummy openCourse for now - will integrate full logic next
        function openCourse(token, title) {
            navigate('pageCourse', title);
            document.getElementById('courseWrap').innerHTML = '<div class="text-center py-20 text-gray-500 font-bold uppercase tracking-widest">Portal Loading...</div>';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
