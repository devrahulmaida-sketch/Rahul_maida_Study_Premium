<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rahul Maida - Next Toppers</title>
<link rel="icon" href="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
    /* ═══════════════════════════════════════════
       RESET & BASE (Rebranded Next Toppers Style)
    ═══════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.35); border-radius: 4px; }

    :root {
        --pr: #6366f1; --pr-d: #4f46e5; --pr-l: rgba(99,102,241,.15);
        --sur: #1e293b; --sur2: #0f172a; --sur3: #273449;
        --bd: rgba(30,41,59,.8); --bd2: rgba(99,102,241,.25);
        --tx: #e2e8f0; --tx2: #cbd5e1; --mu: #64748b; --mu2: #94a3b8;
        --r: 14px; --rs: 10px; --sh: 0 4px 20px rgba(0,0,0,.4);
        --shm: 0 8px 32px rgba(0,0,0,.5);
    }

    .site-header {
        position: fixed; top: 0; left: 0; right: 0; height: 50px;
        background: rgba(15,23,42,.97); border-bottom: 1px solid rgba(30,41,59,.6);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 16px; z-index: 900; box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .logo-wrap { display: flex; align-items: center; gap: 7px; cursor: pointer; }
    .logo-wrap img { height: 28px; width: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--pr); }
    .logo-wrap span { font-size: 13px; font-weight: 900; color: var(--pr); background: var(--pr-l); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--bd2); text-transform: uppercase; }

    .back-bar { display: none; position: fixed; top: 50px; left: 0; right: 0; height: 46px; background: rgba(15,23,42,.97); border-bottom: 1px solid rgba(30,41,59,.6); align-items: center; gap: 8px; padding: 0 10px; z-index: 890; }
    .back-bar.show { display: flex; }
    .back-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--pr-l); display: flex; align-items: center; justify-content: center; }
    .back-bar-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--tx); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .page { display: none; padding-top: 50px; min-height: 100vh; }
    .page.active { display: block; }
    .page.has-back { padding-top: 96px; }
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 14px 12px 60px; }

    /* BATCH GRID */
    .batches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .batch-card { background: var(--sur); border-radius: var(--r); border: 1px solid rgba(30,41,59,.8); overflow: hidden; cursor: pointer; transition: 0.2s; }
    .batch-card:hover { border-color: var(--pr); transform: translateY(-2px); }
    .batch-card-thumb { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
    .batch-card-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    .batch-card-body { padding: 12px; }
    .batch-card-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 8px; line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; height: 2.4rem; }
    .btn-explore { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--pr), var(--pr-d)); color: #fff; border-radius: 10px; font-weight: 700; font-size: 12px; text-transform: uppercase; }

    /* ITEM CARD */
    .item-card { background: var(--sur); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
    .item-card:hover { border-color: var(--pr); background: rgba(99,102,241,0.05); }
    .item-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; }
    .item-info { flex: 1; }
    .item-title { font-size: 14px; font-weight: 700; color: #fff; }
    .item-meta { font-size: 11px; color: #64748b; margin-top: 4px; }

    /* PLAYER MODAL */
    #videoModal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
    #videoModal.active { display: flex; }
    #videoPlayer { width: 100%; height: 100%; max-height: 85vh; background: #000; }
    .v-header { padding: 15px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
    .v-close { color: #fff; font-size: 24px; }

    .spinner { width: 32px; height: 32px; border: 3px solid rgba(99,102,241,.2); border-top-color: var(--pr); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg { text-align: center; py: 40px; color: #64748b; font-weight: 700; uppercase; tracking-widest: 1px; font-size: 12px; }
</style>
</head>
<body>

    <div id="videoModal">
        <div class="v-header">
            <h3 id="vTitle" class="text-sm font-bold uppercase truncate pr-10">Video Player</h3>
            <button onclick="closeVideo()" class="v-close">✕</button>
        </div>
        <div class="flex-grow flex items-center justify-center">
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <header class="site-header">
        <div class="logo-wrap" onclick="location.href='/'">
            <img src="https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg" alt="Logo">
            <span>RAHUL MAIDA | NEXT TOPPERS</span>
        </div>
        <button onclick="location.href='/'" class="text-[10px] font-black uppercase text-indigo-400 border border-indigo-400/30 px-3 py-1.5 rounded-lg">Exit Portal</button>
    </header>

    <div id="backBar" class="back-bar">
        <button class="back-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div id="backBarTitle" class="back-bar-title">Portal</div>
    </div>

    <div id="pageHome" class="page active">
        <div class="page-wrap"><div id="batchesGrid" class="batches-grid"></div></div>
    </div>

    <div id="pageCourse" class="page has-back"><div class="page-wrap" id="courseWrap"></div></div>
    <div id="pageContent" class="page has-back"><div class="page-wrap" id="contentWrap"></div></div>

    <script>
        const PROXY = "https://rahul-study-bot.dev-rahulmaida.workers.dev";
        const S = { history: [], hls: null };

        async function apiFetch(endpoint) {
            const url = `${PROXY}/nexttoppers?endpoint=${encodeURIComponent(endpoint)}`;
            const r = await fetch(url);
            return r.json();
        }

        async function init() {
            const grid = document.getElementById('batchesGrid');
            grid.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await apiFetch('/api/batches');
                if (res && res.success) {
                    grid.innerHTML = res.data.map(b => `
                        <div class="batch-card" onclick="openCourse('${b.token}', '${b.title}')">
                            <div class="batch-card-thumb"><img src="${b.thumbnail || ''}" loading="lazy" onerror="this.src='https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg'"></div>
                            <div class="batch-card-body">
                                <div class="batch-card-title">${b.title}</div>
                                <button class="btn-explore">ENTER BATCH</button>
                            </div>
                        </div>
                    `).join('');
                } else throw new Error();
            } catch (e) { grid.innerHTML = '<div class="text-center py-20 text-red-500 font-bold uppercase tracking-tighter">SERVER ERROR OR BLOCK</div>'; }
        }

        async function openCourse(token, title) {
            navigate('pageCourse', title);
            const wrap = document.getElementById('courseWrap');
            wrap.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await apiFetch('/api/course/' + token);
                if (res.success) {
                    loadContent(res.content_token, title);
                } else throw new Error();
            } catch (e) { wrap.innerHTML = '<div class="empty-msg">FAILED TO LOAD COURSE DETAILS</div>'; }
        }

        async function loadContent(token, title) {
            const wrap = document.getElementById('contentWrap');
            wrap.innerHTML = '<div class="spinner"></div>';
            navigate('pageContent', title);
            try {
                const res = await apiFetch('/api/content/' + token);
                if (res.success && res.data) {
                    wrap.innerHTML = `<div class="space-y-3">${res.data.map(item => {
                        const clickFn = item.type === 'folder' ? `loadContent('${item.token}', '${item.title.replace(/'/g,"")}')` : `openMedia('${item.token}', '${item.title.replace(/'/g,"")}')`;
                        return `
                            <div class="item-card" onclick="${clickFn}">
                                <img src="${item.thumbnail || 'https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg'}" class="item-thumb" onerror="this.src='https://i.ibb.co/RTvsC93K/bannerimage-Rahul-maida.jpg'">
                                <div class="item-info">
                                    <div class="item-title text-sm">${item.title}</div>
                                    <div class="item-meta">${item.type.toUpperCase()}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}</div>`;
                } else wrap.innerHTML = '<div class="empty-msg">NO CONTENT FOUND</div>';
            } catch (e) { wrap.innerHTML = '<div class="empty-msg">ERROR LOADING CONTENT</div>'; }
        }

        async function openMedia(token, title) {
            try {
                const res = await apiFetch('/api/media/' + token);
                if (res.success && res.file_url) {
                    playVideo(res.file_url, title);
                } else alert("Link not found.");
            } catch (e) { alert("Playback error."); }
        }

        function playVideo(url, title) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            document.getElementById('vTitle').innerText = title;
            modal.classList.add('active');
            
            if (Hls.isSupported()) {
                if (S.hls) S.hls.destroy();
                S.hls = new Hls();
                S.hls.loadSource(url);
                S.hls.attachMedia(video);
                S.hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }

        function closeVideo() {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('videoPlayer').pause();
        }

        function navigate(pageId, title) {
            S.history.push({ pageId: document.querySelector('.page.active').id, title: document.getElementById('backBarTitle').innerText });
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('backBar').classList.add('show');
            document.getElementById('backBarTitle').innerText = title;
            window.scrollTo(0,0);
        }

        function goBack() {
            const prev = S.history.pop();
            if (!prev) return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(prev.pageId).classList.add('active');
            if (prev.pageId === 'pageHome') document.getElementById('backBar').classList.remove('show');
            document.getElementById('backBarTitle').innerText = prev.title;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
